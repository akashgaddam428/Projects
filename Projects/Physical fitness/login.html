<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Physical Fitness Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #eaf0fb; }
    .login-container {
      max-width: 400px; margin: 80px auto; background: #fff;
      padding: 40px 32px; border-radius: 10px; box-shadow: 0 2px 12px #ccc;
    }
    h2 { color: #2366A8; margin: 0 0 24px 0; text-align: center; }
    label { display: block; margin: 18px 0 6px; font-weight: bold; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px; font-size: 1em; border: 1px solid #bbb;
      border-radius: 5px; margin-bottom: 18px;
    }
    .login-btn {
      width: 100%; padding: 12px 0; background: #2366A8; color: white;
      border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:hover { background: #183A59; }
    .signup-link {
      display: block; margin-top: 22px; text-align: center;
      font-size: 0.95em; color: #2366A8; text-decoration: none;
    }
    .signup-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form>
      <label for="username">Username or Email</label>
      <input type="text" id="username" name="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    <a href="register.html" class="signup-link">Don't have an account? Register</a>
  </div>
</body>
</html>
