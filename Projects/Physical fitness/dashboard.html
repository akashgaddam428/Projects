<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 0; }
    .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 10px #ccc; }
    h1, h2 { color: #2366A8; }
    ul { padding-left: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fitness Dashboard</h1>
    <h2>Stats</h2>
    <ul>
      <li>Steps: 8,750</li>
      <li>Calories: 430</li>
      <li>Active Minutes: 42</li>
      <li>Water: 1.8 L</li>
    </ul>
    <h2>Recent Workouts</h2>
    <ul>
      <li>Running - 2025-10-28</li>
      <li>Yoga - 2025-10-27</li>
    </ul>
    <h2>Goals</h2>
    <ul>
      <li>Lose 3 kg in 1 month</li>
      <li>Drink 2L water/day</li>
    </ul>
  </div>
</body>
</html>
