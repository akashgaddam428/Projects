<!DOCTYPE html>
<html>
<head>
  <title>My Workouts</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; }
    .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 28px; border-radius: 8px; box-shadow: 0 2px 10px #ccc; }
    h1 { color: #2366A8; }
    .workout { background: #eaf0fb; margin-bottom: 16px; padding: 16px; border-radius: 6px; }
    .add-btn { background: #2366A8; color: #fff; padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; margin-top: 18px;}
    .add-btn:hover { background: #183A59; }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Workouts</h1>
    <div class="workout">
      <strong>🏃 Running</strong><br>
      Date: 2025-10-28<br>Duration: 30 min<br>Calories: 250
    </div>
    <div class="workout">
      <strong>🧘 Yoga</strong><br>
      Date: 2025-10-27<br>Duration: 45 min<br>Calories: 120
    </div>
    <button class="add-btn">Add Workout</button>
  </div>
</body>
</html>
